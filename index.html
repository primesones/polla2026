<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polla Mundial 2026 — Posiciones</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      color: #1a2535;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a3c5e 0%, #2d6a9f 100%);
      color: #fff;
      padding: 24px 16px 20px;
      text-align: center;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.5px; }
    header p  { font-size: 0.85rem; opacity: 0.75; margin-top: 4px; }

    /* ── Tabs ── */
    .tab-bar {
      background: #142e4a;
      padding: 0 12px;
    }
    .tab-bar-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 4px;
    }
    .tab {
      background: none;
      border: none;
      color: rgba(255,255,255,0.55);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 10px 18px 9px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      letter-spacing: 0.3px;
    }
    .tab:hover { color: rgba(255,255,255,0.85); }
    .tab.activo {
      color: #fff;
      border-bottom-color: #5aabf0;
    }

    .container { max-width: 720px; margin: 0 auto; padding: 20px 12px 40px; }

    .updated {
      text-align: right;
      font-size: 0.75rem;
      color: #6b7a8d;
      margin-bottom: 12px;
    }

    .estado {
      text-align: center;
      padding: 48px 16px;
      color: #6b7a8d;
      font-size: 0.95rem;
    }

    /* ── Tabla posiciones ── */
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    thead tr {
      background: #1a3c5e;
      color: #fff;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    th { padding: 12px 10px; text-align: center; font-weight: 600; }
    th:nth-child(2) { text-align: left; }

    tbody tr { border-bottom: 1px solid #e8edf3; transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f5f8fc; }

    td { padding: 13px 10px; text-align: center; font-size: 0.9rem; }
    td:nth-child(2) { text-align: left; font-weight: 600; }

    .pts-detail { color: #6b7a8d; font-size: 0.8rem; }
    .pts-total  { font-weight: 700; font-size: 1rem; color: #1a3c5e; }
    .pos        { font-weight: 700; font-size: 1rem; }
    .medal-1    { color: #b8860b; }
    .medal-2    { color: #6b7a8d; }
    .medal-3    { color: #8b5c2a; }

    tr.top1 { background: #fffbea; }
    tr.top2 { background: #f8f8f8; }
    tr.top3 { background: #fdf5ef; }
    tr.top1:hover { background: #fff6d6; }
    tr.top2:hover { background: #f0f0f0; }
    tr.top3:hover { background: #f7ece2; }

    .nombre-link {
      cursor: pointer;
      color: inherit;
      text-decoration: none;
      display: block;
    }
    .nombre-link:hover { text-decoration: underline; color: #2d6a9f; }
    .alias-tag {
      font-size: 0.75rem;
      color: #6b7a8d;
      font-weight: 400;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-overlay.activo { display: flex; }

    .modal {
      background: #fff;
      border-radius: 14px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .modal-header {
      background: linear-gradient(135deg, #1a3c5e 0%, #2d6a9f 100%);
      color: #fff;
      padding: 18px 20px 14px;
      border-radius: 14px 14px 0 0;
      position: relative;
    }
    .modal-header h2 { font-size: 1.1rem; font-weight: 700; }
    .modal-header .sub { font-size: 0.8rem; opacity: 0.75; margin-top: 2px; }
    .modal-close {
      position: absolute;
      top: 14px; right: 16px;
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
    }
    .modal-close:hover { background: rgba(255,255,255,0.35); }

    .modal-body { padding: 20px; }

    .total-badge {
      text-align: center;
      margin-bottom: 20px;
    }
    .total-badge .pts { font-size: 2.2rem; font-weight: 800; color: #1a3c5e; }
    .total-badge .lbl { font-size: 0.8rem; color: #6b7a8d; margin-top: 2px; }

    .rondas-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 24px;
    }
    .ronda-cell {
      background: #f0f4f8;
      border-radius: 8px;
      padding: 8px 4px;
      text-align: center;
    }
    .ronda-cell .r-pts { font-size: 1.1rem; font-weight: 700; color: #1a3c5e; }
    .ronda-cell .r-lbl { font-size: 0.65rem; color: #6b7a8d; margin-top: 2px; text-transform: uppercase; }
    .ronda-cell.tiene-pts { background: #e8f4fd; }
    .ronda-cell.tiene-pts .r-pts { color: #1565c0; }

    .seccion-titulo {
      font-size: 0.75rem;
      font-weight: 700;
      color: #6b7a8d;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .partidos-lista { margin-bottom: 20px; }
    .partido-fila {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 10px;
      border-radius: 6px;
      margin-bottom: 4px;
      font-size: 0.88rem;
    }
    .partido-fila.con-pts { background: #e8f4fd; }
    .partido-fila.sin-pts { background: #f8f9fa; color: #aaa; }
    .partido-fila .p-pts {
      font-weight: 700;
      min-width: 36px;
      text-align: right;
    }
    .partido-fila.con-pts .p-pts { color: #1565c0; }

    .modal-cargando { text-align: center; padding: 40px 20px; color: #6b7a8d; }
    .modal-error    { text-align: center; padding: 40px 20px; color: #c0392b; }

    /* ── Acordeón estadísticas ── */
    .ac-item {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      margin-bottom: 10px;
      overflow: hidden;
    }

    .ac-header {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      cursor: pointer;
      gap: 12px;
      user-select: none;
      transition: background 0.15s;
    }
    .ac-header:hover { background: #f5f8fc; }

    .ac-info { flex: 1; min-width: 0; }
    .ac-titulo {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1a2535;
    }
    .ac-meta {
      font-size: 0.75rem;
      color: #8a9bb0;
      margin-top: 2px;
    }

    .ac-tags {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
    }
    .ac-tag {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .ac-tag-w { background: #d5f5e3; color: #1a6b3a; }
    .ac-tag-d { background: #fef9e7; color: #8a6200; }
    .ac-tag-l { background: #fde8e8; color: #8b1a1a; }

    .ac-arrow {
      font-size: 1.1rem;
      color: #8a9bb0;
      flex-shrink: 0;
      transition: transform 0.25s;
    }
    .ac-item.abierto .ac-arrow { transform: rotate(90deg); }

    .ac-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .ac-item.abierto .ac-body { max-height: 900px; }

    .ac-body-inner {
      padding: 4px 16px 18px;
      border-top: 1px solid #eef2f6;
    }

    .ac-seccion {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #8a9bb0;
      margin: 14px 0 8px;
    }

    /* Barras W/D/L */
    .wdl-row {
      display: flex;
      align-items: center;
      margin-bottom: 7px;
      gap: 8px;
    }
    .wdl-lbl {
      width: 72px;
      font-size: 0.82rem;
      font-weight: 600;
      flex-shrink: 0;
    }
    .wdl-pct {
      width: 34px;
      font-size: 0.82rem;
      font-weight: 700;
      text-align: right;
      flex-shrink: 0;
    }
    .wdl-pct-w { color: #1e8449; }
    .wdl-pct-d { color: #b7770d; }
    .wdl-pct-l { color: #c0392b; }
    .wdl-track {
      flex: 1;
      height: 20px;
      background: #f0f4f8;
      border-radius: 3px;
      overflow: hidden;
    }
    .wdl-fill { height: 100%; border-radius: 3px; min-width: 3px; }
    .wdl-fill-w { background: linear-gradient(90deg, #1a7a3f, #27ae60); }
    .wdl-fill-d { background: linear-gradient(90deg, #c47e00, #f39c12); }
    .wdl-fill-l { background: linear-gradient(90deg, #a93226, #e74c3c); }
    .wdl-cnt {
      width: 60px;
      text-align: right;
      font-size: 0.75rem;
      color: #8a9bb0;
      flex-shrink: 0;
    }

    /* Barras marcadores */
    .sc-row {
      display: flex;
      align-items: center;
      margin-bottom: 5px;
      gap: 8px;
    }
    .sc-lbl {
      width: 38px;
      font-size: 0.82rem;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      color: #1a2535;
      flex-shrink: 0;
    }
    .sc-row:first-child .sc-lbl { color: #1a4f72; }
    .sc-track {
      flex: 1;
      height: 16px;
      background: #f0f4f8;
      border-radius: 3px;
      overflow: hidden;
    }
    .sc-fill {
      height: 100%;
      background: linear-gradient(90deg, #1a4f72, #2980b9);
      border-radius: 3px;
      min-width: 3px;
    }
    .sc-row:first-child .sc-fill { background: linear-gradient(90deg, #0d2137, #1a5276); }
    .sc-cnt {
      width: 72px;
      text-align: right;
      font-size: 0.75rem;
      color: #8a9bb0;
      flex-shrink: 0;
    }
    .sc-row:first-child .sc-cnt { font-weight: 700; color: #1a4f72; }

    @media (max-width: 480px) {
      .hide-mobile { display: none; }
      header h1 { font-size: 1.2rem; }
      .rondas-grid { grid-template-columns: repeat(3, 1fr); }
      .ac-tags { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>Polla Mundial 2026</h1>
  <p>Tabla de posiciones en tiempo real</p>
</header>

<div class="tab-bar">
  <div class="tab-bar-inner">
    <button class="tab activo" id="tab-btn-pos" onclick="cambiarTab('posiciones')">Posiciones</button>
    <button class="tab"        id="tab-btn-est" onclick="cambiarTab('estadisticas')">Estadísticas</button>
  </div>
</div>

<div class="container">

  <!-- Tab Posiciones -->
  <div id="tab-posiciones">
    <div class="updated" id="updated"></div>
    <div id="contenido"><div class="estado">Cargando...</div></div>
  </div>

  <!-- Tab Estadísticas -->
  <div id="tab-estadisticas" style="display:none">
    <div class="updated" id="stats-updated"></div>
    <div id="stats-contenido"><div class="estado">Cargando estadísticas...</div></div>
  </div>

</div>

<!-- Modal detalle individual -->
<div class="modal-overlay" id="modalOverlay" onclick="cerrarModal(event)">
  <div class="modal" id="modalCard">
    <div class="modal-header" id="modalHeader">
      <h2 id="modalNombre"></h2>
      <div class="sub" id="modalSub"></div>
      <button class="modal-close" onclick="cerrarModal(null)">&#x2715;</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="modal-cargando">Cargando detalle...</div>
    </div>
  </div>
</div>

<script>
  var BASE_URL = 'https://script.google.com/macros/s/AKfycbwQsVMWYFkFSSlLrNahg1VQVv1dnYc1D3VZq3eY4ZopTBTtp6Qg0Kq-ICVSgkHRKVx8/exec';
  var API_URL  = BASE_URL + '?format=json';

  var GRUPO_LABELS = { 'COL-G01': 'vs Uzbekistán', 'COL-G02': 'vs Congo DR', 'COL-G03': 'vs Portugal' };
  var RONDA_ORDEN  = [
    { key: 'ptsGrupos', label: 'Grupos',    ids: ['COL-G01','COL-G02','COL-G03'] },
    { key: 'ptsR32',    label: 'R32',       ids: null },
    { key: 'ptsR16',    label: 'Octavos',   ids: null },
    { key: 'ptsQF',     label: 'Cuartos',   ids: null },
    { key: 'ptsSF',     label: 'Semis',     ids: null },
    { key: 'ptsFinal',  label: 'Final',     ids: null },
    { key: 'ptsBonos',  label: 'Bonus',     ids: null },
  ];

  var statsYaCargadas = false;

  // ── Carga inicial posiciones ──────────────────────────────
  fetch(API_URL)
    .then(function(r) { return r.json(); })
    .then(function(datos) { renderizar(datos); })
    .catch(function() {
      document.getElementById('contenido').innerHTML =
        '<div class="estado">Error al cargar los datos. Intenta de nuevo.</div>';
    });

  // ── Tabs ─────────────────────────────────────────────────
  function cambiarTab(tab) {
    var esPos = tab === 'posiciones';
    document.getElementById('tab-posiciones').style.display  = esPos ? '' : 'none';
    document.getElementById('tab-estadisticas').style.display = esPos ? 'none' : '';
    document.getElementById('tab-btn-pos').classList.toggle('activo', esPos);
    document.getElementById('tab-btn-est').classList.toggle('activo', !esPos);
    if (!esPos && !statsYaCargadas) cargarEstadisticas();
  }

  // ── Estadísticas ─────────────────────────────────────────
  function cargarEstadisticas() {
    document.getElementById('stats-contenido').innerHTML =
      '<div class="estado">Cargando estadísticas...</div>';

    fetch(BASE_URL + '?format=statsjson')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        statsYaCargadas = true;
        renderizarStats(data);
      })
      .catch(function() {
        document.getElementById('stats-contenido').innerHTML =
          '<div class="estado">Error al cargar estadísticas. Intenta de nuevo.</div>';
      });
  }

  function renderizarStats(data) {
    var matches = data.matches || [];
    if (matches.length === 0) {
      document.getElementById('stats-contenido').innerHTML =
        '<div class="estado">Sin estadísticas disponibles aún.<br>' +
        '<small>El administrador debe ejecutar "Estadísticas → Fase 1" desde la hoja maestra.</small></div>';
      return;
    }

    var ts = matches[matches.length - 1].timestamp || '';
    if (ts) document.getElementById('stats-updated').textContent = 'Actualizado: ' + ts;

    var html = '';
    matches.forEach(function(m) {
      var tot = m.total || 1;
      var wPct = (m.W / tot * 100).toFixed(0);
      var dPct = (m.D / tot * 100).toFixed(0);
      var lPct = (m.L / tot * 100).toFixed(0);

      html += '<div class="ac-item" id="ac-' + esc(m.id) + '">' +
        '<div class="ac-header" onclick="toggleAc(' + "'" + escJs(m.id) + "'" + ')">' +
          '<div class="ac-info">' +
            '<div class="ac-titulo">' + esc(m.local) + ' vs ' + esc(m.visit) + '</div>' +
            '<div class="ac-meta">' + esc(m.label) + ' &nbsp;·&nbsp; ' + m.total + '/' + m.totalPartic + ' predicciones</div>' +
          '</div>' +
          '<div class="ac-tags">' +
            '<span class="ac-tag ac-tag-w">V ' + wPct + '%</span>' +
            '<span class="ac-tag ac-tag-d">E ' + dPct + '%</span>' +
            '<span class="ac-tag ac-tag-l">D ' + lPct + '%</span>' +
          '</div>' +
          '<span class="ac-arrow">&#8250;</span>' +
        '</div>' +
        '<div class="ac-body">' +
          '<div class="ac-body-inner">' + renderStatsBody(m) + '</div>' +
        '</div>' +
        '</div>';
    });

    document.getElementById('stats-contenido').innerHTML = html;
  }

  function renderStatsBody(m) {
    var tot  = m.total > 0 ? m.total : 1;
    var maxC = m.maxCount > 0 ? m.maxCount : 1;
    var html = '';

    // W/D/L
    html += '<div class="ac-seccion">Resultado Colombia</div>';
    var wdlRows = [
      { lbl: 'Victoria', cnt: m.W, pctCls: 'wdl-pct-w', fillCls: 'wdl-fill-w' },
      { lbl: 'Empate',   cnt: m.D, pctCls: 'wdl-pct-d', fillCls: 'wdl-fill-d' },
      { lbl: 'Derrota',  cnt: m.L, pctCls: 'wdl-pct-l', fillCls: 'wdl-fill-l' },
    ];
    wdlRows.forEach(function(r) {
      var pct = (r.cnt / tot * 100).toFixed(1);
      html += '<div class="wdl-row">' +
        '<div class="wdl-lbl">' + r.lbl + '</div>' +
        '<div class="wdl-pct ' + r.pctCls + '">' + (r.cnt / tot * 100).toFixed(0) + '%</div>' +
        '<div class="wdl-track"><div class="wdl-fill ' + r.fillCls + '" style="width:' + pct + '%"></div></div>' +
        '<div class="wdl-cnt">' + r.cnt + ' pollas</div>' +
        '</div>';
    });

    // Marcadores
    if (m.sortedScores && m.sortedScores.length > 0) {
      html += '<div class="ac-seccion">Marcadores más apostados (' + esc(m.local) + ' — ' + esc(m.visit) + ')</div>';
      m.sortedScores.forEach(function(sc, i) {
        var w = (sc[1] / maxC * 100).toFixed(1);
        var pct = (sc[1] / tot * 100).toFixed(1);
        html += '<div class="sc-row">' +
          '<div class="sc-lbl">' + esc(sc[0]) + '</div>' +
          '<div class="sc-track"><div class="sc-fill" style="width:' + w + '%"></div></div>' +
          '<div class="sc-cnt">' + sc[1] + ' &nbsp;·&nbsp; ' + pct + '%</div>' +
          '</div>';
      });
    }

    return html;
  }

  function toggleAc(id) {
    var item = document.getElementById('ac-' + id);
    if (item) item.classList.toggle('abierto');
  }

  // ── Posiciones ───────────────────────────────────────────
  function renderizar(datos) {
    document.getElementById('updated').textContent = 'Actualizado: ' + datos.actualizado;

    if (!datos.filas || datos.filas.length === 0) {
      document.getElementById('contenido').innerHTML =
        '<div class="estado">Aún no hay participantes habilitados.</div>';
      return;
    }

    var medals    = ['', '🥇', '🥈', '🥉'];
    var medalClass = ['', 'medal-1', 'medal-2', 'medal-3'];
    var rowClass   = ['', 'top1',    'top2',    'top3'];

    var html = '<table><thead><tr>' +
      '<th>#</th>' +
      '<th>Participante</th>' +
      '<th>Total</th>' +
      '<th class="hide-mobile">Grupos</th>' +
      '<th class="hide-mobile">R32</th>' +
      '<th class="hide-mobile">Octavos</th>' +
      '<th class="hide-mobile">Cuartos</th>' +
      '<th class="hide-mobile">Semis</th>' +
      '<th class="hide-mobile">Final</th>' +
      '<th class="hide-mobile">Bonus</th>' +
      '</tr></thead><tbody>';

    datos.filas.forEach(function(f) {
      var pos  = f.posicion;
      var icon = pos <= 3 ? medals[pos] : pos;
      var mc   = pos <= 3 ? medalClass[pos] : '';
      var rc   = pos <= 3 ? rowClass[pos]   : '';
      html += '<tr class="' + rc + '">' +
        '<td><span class="pos ' + mc + '">' + icon + '</span></td>' +
        '<td>' +
          '<span class="nombre-link" onclick="verDetalle(' + "'" + escJs(f.alias) + "'" + ')">' +
            esc(f.nombre) +
          '</span>' +
          '<br><span class="alias-tag">' + esc(f.alias) + '</span>' +
        '</td>' +
        '<td class="pts-total">'              + f.total     + '</td>' +
        '<td class="pts-detail hide-mobile">' + f.ptsGrupos + '</td>' +
        '<td class="pts-detail hide-mobile">' + f.ptsR32    + '</td>' +
        '<td class="pts-detail hide-mobile">' + f.ptsR16    + '</td>' +
        '<td class="pts-detail hide-mobile">' + f.ptsQF     + '</td>' +
        '<td class="pts-detail hide-mobile">' + f.ptsSF     + '</td>' +
        '<td class="pts-detail hide-mobile">' + f.ptsFinal  + '</td>' +
        '<td class="pts-detail hide-mobile">' + f.ptsBonos  + '</td>' +
        '</tr>';
    });

    html += '</tbody></table>';
    document.getElementById('contenido').innerHTML = html;
  }

  // ── Modal ─────────────────────────────────────────────────
  function verDetalle(alias) {
    document.getElementById('modalNombre').textContent = alias;
    document.getElementById('modalSub').textContent    = '';
    document.getElementById('modalBody').innerHTML     = '<div class="modal-cargando">Cargando detalle...</div>';
    document.getElementById('modalOverlay').classList.add('activo');

    fetch(BASE_URL + '?format=detail&alias=' + encodeURIComponent(alias))
      .then(function(r) { return r.json(); })
      .then(function(d) { renderizarDetalle(d); })
      .catch(function() {
        document.getElementById('modalBody').innerHTML =
          '<div class="modal-error">Error al cargar el detalle.</div>';
      });
  }

  function renderizarDetalle(d) {
    if (d.error) {
      document.getElementById('modalBody').innerHTML =
        '<div class="modal-error">' + esc(d.error) + '</div>';
      return;
    }

    document.getElementById('modalNombre').textContent = d.nombre;
    document.getElementById('modalSub').textContent    = d.alias + '  ·  Posición #' + d.posicion;

    var rondasHtml = '<div class="rondas-grid">';
    RONDA_ORDEN.forEach(function(r) {
      var pts = d[r.key] || 0;
      var cls = pts > 0 ? 'ronda-cell tiene-pts' : 'ronda-cell';
      rondasHtml += '<div class="' + cls + '">' +
        '<div class="r-pts">' + pts + '</div>' +
        '<div class="r-lbl">' + r.label + '</div>' +
        '</div>';
    });
    rondasHtml += '</div>';

    var gruposHtml = '<div class="seccion-titulo">Colombia — Grupos</div><div class="partidos-lista">';
    ['COL-G01','COL-G02','COL-G03'].forEach(function(id) {
      var pts = (d.matchPts && d.matchPts[id]) || 0;
      var cls = pts > 0 ? 'partido-fila con-pts' : 'partido-fila sin-pts';
      gruposHtml += '<div class="' + cls + '">' +
        '<span>' + (GRUPO_LABELS[id] || id) + '</span>' +
        '<span class="p-pts">' + pts + ' pts</span>' +
        '</div>';
    });
    gruposHtml += '</div>';

    var elimIds = Object.keys(d.matchPts || {}).filter(function(id) {
      return !id.startsWith('COL-') && d.matchPts[id] > 0;
    });
    var elimHtml = '';
    if (elimIds.length > 0) {
      elimHtml = '<div class="seccion-titulo">Eliminatorias</div><div class="partidos-lista">';
      elimIds.forEach(function(id) {
        var pts = d.matchPts[id];
        elimHtml += '<div class="partido-fila con-pts">' +
          '<span>' + id + '</span>' +
          '<span class="p-pts">' + pts + ' pts</span>' +
          '</div>';
      });
      elimHtml += '</div>';
    } else {
      elimHtml = '<div class="seccion-titulo">Eliminatorias</div>' +
        '<div class="partidos-lista"><div class="partido-fila sin-pts">' +
        '<span>Sin puntos en eliminatorias aún</span><span class="p-pts">—</span></div></div>';
    }

    document.getElementById('modalBody').innerHTML =
      '<div class="total-badge">' +
        '<div class="pts">' + d.total + '</div>' +
        '<div class="lbl">puntos totales</div>' +
      '</div>' +
      rondasHtml + gruposHtml + elimHtml;
  }

  function cerrarModal(e) {
    if (e && e.target !== document.getElementById('modalOverlay')) return;
    document.getElementById('modalOverlay').classList.remove('activo');
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function escJs(s) {
    return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  }
</script>

</body>
</html>
