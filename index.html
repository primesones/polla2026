<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polla Mundial 2026 — Posiciones</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      color: #1a2535;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a3c5e 0%, #2d6a9f 100%);
      color: #fff;
      padding: 24px 16px 20px;
      text-align: center;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.5px; }
    header p  { font-size: 0.85rem; opacity: 0.75; margin-top: 4px; }

    /* ── Tabs ── */
    .tab-bar {
      background: #142e4a;
      padding: 0 12px;
    }
    .tab-bar-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 4px;
    }
    .tab {
      background: none;
      border: none;
      color: rgba(255,255,255,0.55);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 10px 18px 9px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      letter-spacing: 0.3px;
    }
    .tab:hover { color: rgba(255,255,255,0.85); }
    .tab.activo {
      color: #fff;
      border-bottom-color: #5aabf0;
    }

    .container { max-width: 720px; margin: 0 auto; padding: 20px 12px 40px; }

    .updated {
      text-align: right;
      font-size: 0.75rem;
      color: #6b7a8d;
      margin-bottom: 12px;
    }

    .estado {
      text-align: center;
      padding: 48px 16px;
      color: #6b7a8d;
      font-size: 0.95rem;
    }

    /* ── Tabla posiciones ── */
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    thead tr {
      background: #1a3c5e;
      color: #fff;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    th { padding: 12px 10px; text-align: center; font-weight: 600; }
    th:nth-child(2) { text-align: left; }

    tbody tr { border-bottom: 1px solid #e8edf3; transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f5f8fc; }

    td { padding: 13px 10px; text-align: center; font-size: 0.9rem; }
    td:nth-child(2) { text-align: left; font-weight: 600; }

    .pts-detail { color: #6b7a8d; font-size: 0.8rem; }
    .pts-total  { font-weight: 700; font-size: 1rem; color: #1a3c5e; }
    .pos        { font-weight: 700; font-size: 1rem; }
    .medal-1    { color: #b8860b; }
    .medal-2    { color: #6b7a8d; }
    .medal-3    { color: #8b5c2a; }

    tr.top1 { background: #fffbea; }
    tr.top2 { background: #f8f8f8; }
    tr.top3 { background: #fdf5ef; }
    tr.top1:hover { background: #fff6d6; }
    tr.top2:hover { background: #f0f0f0; }
    tr.top3:hover { background: #f7ece2; }

    .nombre-link {
      cursor: pointer;
      color: inherit;
      text-decoration: none;
      display: block;
    }
    .nombre-link:hover { text-decoration: underline; color: #2d6a9f; }
    .alias-tag {
      font-size: 0.75rem;
      color: #6b7a8d;
      font-weight: 400;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-overlay.activo { display: flex; }

    .modal {
      background: #fff;
      border-radius: 14px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .modal-header {
      background: linear-gradient(135deg, #1a3c5e 0%, #2d6a9f 100%);
      color: #fff;
      padding: 18px 20px 14px;
      border-radius: 14px 14px 0 0;
      position: relative;
    }
    .modal-header h2 { font-size: 1.1rem; font-weight: 700; }
    .modal-header .sub { font-size: 0.8rem; opacity: 0.75; margin-top: 2px; }
    .modal-close {
      position: absolute;
      top: 14px; right: 16px;
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
    }
    .modal-close:hover { background: rgba(255,255,255,0.35); }

    .modal-body { padding: 20px; }

    .total-badge {
      text-align: center;
      margin-bottom: 20px;
    }
    .total-badge .pts { font-size: 2.2rem; font-weight: 800; color: #1a3c5e; }
    .total-badge .lbl { font-size: 0.8rem; color: #6b7a8d; margin-top: 2px; }

    .rondas-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 24px;
    }
    .ronda-cell {
      background: #f0f4f8;
      border-radius: 8px;
      padding: 8px 4px;
      text-align: center;
    }
    .ronda-cell .r-pts { font-size: 1.1rem; font-weight: 700; color: #1a3c5e; }
    .ronda-cell .r-lbl { font-size: 0.65rem; color: #6b7a8d; margin-top: 2px; text-transform: uppercase; }
    .ronda-cell.tiene-pts { background: #e8f4fd; }
    .ronda-cell.tiene-pts .r-pts { color: #1565c0; }

    .seccion-titulo {
      font-size: 0.75rem;
      font-weight: 700;
      color: #6b7a8d;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .partidos-lista { margin-bottom: 20px; }
    .partido-fila {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 9px 10px;
      border-radius: 6px;
      margin-bottom: 4px;
    }
    .partido-fila.con-pts { background: #e8f4fd; }
    .partido-fila.sin-pts { background: #f8f9fa; }
    .partido-fila .p-info { flex: 1; min-width: 0; }

    /* Línea 1: resultado real con banderas */
    .p-resultado {
      font-size: 0.85rem;
      font-weight: 600;
      color: #1a3c5e;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
    }
    .p-resultado .p-flag {
      width: 16px;
      height: 16px;
      border-radius: 2px;
      object-fit: cover;
      vertical-align: middle;
      flex-shrink: 0;
    }
    .p-resultado .p-score {
      font-weight: 700;
      font-size: 0.9rem;
      color: #0d47a1;
      background: rgba(13,71,161,0.09);
      padding: 1px 7px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }
    .partido-fila.sin-pts .p-resultado { color: #888; }
    .partido-fila.sin-pts .p-score     { color: #aaa; background: rgba(0,0,0,0.05); }

    /* Línea 2: llave predicha R16+ */
    .p-llave {
      font-size: 0.72rem;
      color: #7a869a;
      margin-top: 4px;
    }

    /* Línea 3: predicción del participante */
    .p-pred-line {
      font-size: 0.75rem;
      color: #1565c0;
      margin-top: 4px;
    }
    .partido-fila.sin-pts .p-pred-line { color: #aaa; }

    /* Línea 4: desglose de puntos */
    .p-desglose {
      font-size: 0.70rem;
      color: #8d99a8;
      margin-top: 3px;
    }

    .chk-ok   { color: #2e7d32; font-weight: 600; }
    .chk-fail { color: #c62828; font-weight: 600; }

    .partido-fila .p-pts {
      font-weight: 700;
      min-width: 38px;
      text-align: right;
      font-size: 0.9rem;
      margin-left: 8px;
      padding-top: 1px;
    }
    .partido-fila.con-pts .p-pts { color: #1565c0; }
    .partido-fila.sin-pts .p-pts { color: #aaa; }

    .modal-cargando { text-align: center; padding: 40px 20px; color: #6b7a8d; }
    .modal-error    { text-align: center; padding: 40px 20px; color: #c0392b; }

    /* ── Acordeón estadísticas ── */
    .ac-item {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      margin-bottom: 10px;
      overflow: hidden;
    }

    .ac-header {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      cursor: pointer;
      gap: 12px;
      user-select: none;
      transition: background 0.15s;
    }
    .ac-header:hover { background: #f5f8fc; }

    .ac-info { flex: 1; min-width: 0; }
    .ac-titulo {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1a2535;
    }
    .ac-meta {
      font-size: 0.75rem;
      color: #8a9bb0;
      margin-top: 2px;
    }

    .ac-tags {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
    }
    .ac-tag {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .ac-tag-w { background: #d5f5e3; color: #1a6b3a; }
    .ac-tag-d { background: #fef9e7; color: #8a6200; }
    .ac-tag-l { background: #fde8e8; color: #8b1a1a; }

    .ac-arrow {
      font-size: 1.1rem;
      color: #8a9bb0;
      flex-shrink: 0;
      transition: transform 0.25s;
    }
    .ac-item.abierto .ac-arrow { transform: rotate(90deg); }

    .ac-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .ac-item.abierto .ac-body { max-height: 900px; }

    .ac-body-inner {
      padding: 4px 16px 18px;
      border-top: 1px solid #eef2f6;
    }

    .ac-seccion {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #8a9bb0;
      margin: 14px 0 8px;
    }
    .stats-seccion-hdr {
      font-weight: 700;
      font-size: 13px;
      color: #1a3a5c;
      padding: 16px 0 6px;
      border-bottom: 2px solid #1a3a5c;
      margin-bottom: 4px;
      letter-spacing: 0.3px;
    }
    .ac-titulo-match {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .ac-flag-hdr { width: 22px; height: 16px; object-fit: cover; border-radius: 2px; flex-shrink: 0; }
    .ac-equipo-nm { font-size: 0.88rem; font-weight: 600; color: #1a2a3a; }
    .ac-marcador-real { font-weight: 800; font-size: 1rem; color: #1a3a5c; padding: 0 4px; }
    .ac-vs-sep { color: #8a9bb0; font-size: 0.82rem; padding: 0 2px; }

    /* Barras W/D/L */
    .wdl-row {
      display: flex;
      align-items: center;
      margin-bottom: 7px;
      gap: 8px;
    }
    .wdl-lbl {
      width: 72px;
      font-size: 0.82rem;
      font-weight: 600;
      flex-shrink: 0;
    }
    .wdl-pct {
      width: 34px;
      font-size: 0.82rem;
      font-weight: 700;
      text-align: right;
      flex-shrink: 0;
    }
    .wdl-pct-w { color: #1e8449; }
    .wdl-pct-d { color: #b7770d; }
    .wdl-pct-l { color: #c0392b; }
    .wdl-track {
      flex: 1;
      height: 20px;
      background: #f0f4f8;
      border-radius: 3px;
      overflow: hidden;
    }
    .wdl-fill { height: 100%; border-radius: 3px; min-width: 3px; }
    .wdl-fill-w { background: linear-gradient(90deg, #1a7a3f, #27ae60); }
    .wdl-fill-d { background: linear-gradient(90deg, #c47e00, #f39c12); }
    .wdl-fill-l { background: linear-gradient(90deg, #a93226, #e74c3c); }
    .wdl-cnt {
      width: 60px;
      text-align: right;
      font-size: 0.75rem;
      color: #8a9bb0;
      flex-shrink: 0;
    }

    /* Barras marcadores */
    .sc-row {
      display: flex;
      align-items: center;
      margin-bottom: 5px;
      gap: 8px;
    }
    .sc-lbl {
      width: 38px;
      font-size: 0.82rem;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      color: #1a2535;
      flex-shrink: 0;
    }
    .sc-row:first-child .sc-lbl { color: #1a4f72; }
    .sc-track {
      flex: 1;
      height: 16px;
      background: #f0f4f8;
      border-radius: 3px;
      overflow: hidden;
    }
    .sc-fill {
      height: 100%;
      background: linear-gradient(90deg, #1a4f72, #2980b9);
      border-radius: 3px;
      min-width: 3px;
    }
    .sc-row:first-child .sc-fill { background: linear-gradient(90deg, #0d2137, #1a5276); }
    .sc-cnt {
      width: 72px;
      text-align: right;
      font-size: 0.75rem;
      color: #8a9bb0;
      flex-shrink: 0;
    }
    .sc-row:first-child .sc-cnt { font-weight: 700; color: #1a4f72; }

    @media (max-width: 480px) {
      .hide-mobile { display: none; }
      header h1 { font-size: 1.2rem; }
      .rondas-grid { grid-template-columns: repeat(3, 1fr); }
      .ac-tags { display: none; }
    }

    /* ── Stats Fase 2 ── */
    .f2-divider {
      font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: #fff;
      background: linear-gradient(135deg, #1a3c5e, #2d6a9f);
      padding: 8px 14px; border-radius: 8px; margin: 28px 0 16px;
    }
    .f2-sub {
      font-size: 0.70rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: #6b7a8d;
      margin: 20px 0 10px; padding-bottom: 4px; border-bottom: 1px solid #e2e8f0;
    }
    .bono-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 4px; }
    @media (max-width: 520px) { .bono-grid { grid-template-columns: 1fr; } }
    .bono-card {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
      padding: 10px 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .bono-card-head {
      font-size: 0.71rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 8px; padding-bottom: 5px;
      border-bottom: 2px solid #e2e8f0;
    }
    .bono-card-head.gold   { color: #b8860b; border-color: #f0d060; }
    .bono-card-head.silver { color: #536571; border-color: #b0bec5; }
    .bono-card-head.bronze { color: #7d4e2a; border-color: #c49a6c; }
    .bono-row { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
    .bono-equipo { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.78rem; color: #1a2535; }
    .bono-track  { width: 44px; height: 7px; background: #e8edf2; border-radius: 4px; overflow: hidden; flex-shrink: 0; }
    .bono-fill   { height: 100%; border-radius: 4px; }
    .bono-fill.gold   { background: #c9a227; }
    .bono-fill.silver { background: #6b7a8d; }
    .bono-fill.bronze { background: #8b5c2a; }
    .bono-cnt    { font-size: 0.70rem; color: #8a9bb0; min-width: 16px; text-align: right; flex-shrink: 0; }

    .llave-match {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
      padding: 10px 12px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .llave-match-titulo { font-size: 0.82rem; font-weight: 600; color: #1a3c5e; margin-bottom: 7px; }
    .llave-bar-cont { display: flex; height: 22px; border-radius: 4px; overflow: hidden; gap: 1px; }
    .llave-seg {
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 700; color: #fff; overflow: hidden; white-space: nowrap;
    }
    .llave-seg.ambos   { background: #2e7d32; }
    .llave-seg.uno     { background: #f9a825; }
    .llave-seg.ninguno { background: #c62828; }
    .llave-seg.sinData { background: #d5dce4; color: #6b7a8d; }
    .llave-leyenda { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 6px; font-size: 0.68rem; color: #6b7a8d; }
    .llave-dot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; margin-right: 3px; vertical-align: middle; }

    .ronda-section { margin-bottom: 16px; }
    .ronda-section-titulo { font-size: 0.72rem; font-weight: 700; color: #2d6a9f; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .equipo-row { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
    .equipo-pos    { width: 16px; color: #aab4c0; font-size: 0.68rem; text-align: right; flex-shrink: 0; }
    .equipo-nombre { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.80rem; color: #1a2535; }
    .equipo-track  { width: 80px; height: 8px; background: #e8edf2; border-radius: 4px; overflow: hidden; flex-shrink: 0; }
    .equipo-fill   { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #1a3c5e, #2d6a9f); }
    .equipo-cnt    { font-size: 0.72rem; color: #8a9bb0; min-width: 28px; text-align: right; flex-shrink: 0; }
  </style>
</head>
<body>

<header>
  <h1>Polla Mundial 2026</h1>
  <p>Tabla de posiciones en tiempo real</p>
</header>

<div class="tab-bar">
  <div class="tab-bar-inner">
    <button class="tab activo" id="tab-btn-pos" onclick="cambiarTab('posiciones')">Posiciones</button>
    <button class="tab"        id="tab-btn-est" onclick="cambiarTab('estadisticas')">Estadísticas</button>
  </div>
</div>

<div class="container">

  <!-- Tab Posiciones -->
  <div id="tab-posiciones">
    <div class="updated" id="updated"></div>
    <div id="contenido"><div class="estado">Cargando...</div></div>
  </div>

  <!-- Tab Estadísticas -->
  <div id="tab-estadisticas" style="display:none">
    <div class="updated" id="stats-updated"></div>
    <div id="stats-contenido"><div class="estado">Cargando estadísticas...</div></div>
    <div id="stats-f2-contenido"></div>
  </div>

</div>

<!-- Modal detalle individual -->
<div class="modal-overlay" id="modalOverlay" onclick="cerrarModal(event)">
  <div class="modal" id="modalCard">
    <div class="modal-header" id="modalHeader">
      <h2 id="modalNombre"></h2>
      <div class="sub" id="modalSub"></div>
      <button class="modal-close" onclick="cerrarModal(null)">&#x2715;</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="modal-cargando">Cargando detalle...</div>
    </div>
  </div>
</div>

<script>
  var BASE_URL = 'https://script.google.com/macros/s/AKfycbwQsVMWYFkFSSlLrNahg1VQVv1dnYc1D3VZq3eY4ZopTBTtp6Qg0Kq-ICVSgkHRKVx8/exec';
  var API_URL  = BASE_URL + '?format=json';

  var RONDA_ORDEN = [
    { key: 'ptsGrupos', label: 'Colombia — Grupos',    ids: ['COL-G01','COL-G02','COL-G03'] },
    { key: 'ptsR32',    label: 'Dieciseisavos (R32)',  ids: ['R32-01','R32-02','R32-03','R32-04','R32-05','R32-06','R32-07','R32-08','R32-09','R32-10','R32-11','R32-12','R32-13','R32-14','R32-15','R32-16'] },
    { key: 'ptsR16',    label: 'Octavos de final',     ids: ['R16-01','R16-02','R16-03','R16-04','R16-05','R16-06','R16-07','R16-08'] },
    { key: 'ptsQF',     label: 'Cuartos de final',     ids: ['QF-01','QF-02','QF-03','QF-04'] },
    { key: 'ptsSF',     label: 'Semifinales',           ids: ['SF-01','SF-02'] },
    { key: 'ptsFinal',  label: 'Final y 3er puesto',   ids: ['3RD-01','FINAL'] },
  ];
  // Labels para el grid de resumen (sin Bonus)
  var RONDA_RESUMEN = RONDA_ORDEN.concat([{ key: 'ptsBonos', label: 'Bonus', ids: [] }]);

  var statsYaCargadas = false;

  // ── Carga inicial posiciones ──────────────────────────────
  fetch(API_URL)
    .then(function(r) { return r.json(); })
    .then(function(datos) { renderizar(datos); })
    .catch(function() {
      document.getElementById('contenido').innerHTML =
        '<div class="estado">Error al cargar los datos. Intenta de nuevo.</div>';
    });

  // ── Tabs ─────────────────────────────────────────────────
  function cambiarTab(tab) {
    var esPos = tab === 'posiciones';
    document.getElementById('tab-posiciones').style.display  = esPos ? '' : 'none';
    document.getElementById('tab-estadisticas').style.display = esPos ? 'none' : '';
    document.getElementById('tab-btn-pos').classList.toggle('activo', esPos);
    document.getElementById('tab-btn-est').classList.toggle('activo', !esPos);
    if (!esPos && !statsYaCargadas) cargarEstadisticas();
  }

  // ── Estadísticas ─────────────────────────────────────────
  function fechaBogota(utcStr) {
    try {
      var d = new Date(utcStr);
      if (isNaN(d)) return utcStr;
      var b = new Date(d.getTime() - 5 * 3600000); // UTC-5 Bogotá
      var dias   = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
      var meses  = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      return dias[b.getUTCDay()] + ' ' + b.getUTCDate() + ' ' + meses[b.getUTCMonth()] +
             ' · ' + String(b.getUTCHours()).padStart(2,'0') + ':' +
             String(b.getUTCMinutes()).padStart(2,'0') + ' Bogotá';
    } catch(e) { return ''; }
  }

  function cargarEstadisticas() {
    document.getElementById('stats-contenido').innerHTML =
      '<div class="estado">Cargando estadísticas...</div>';
    document.getElementById('stats-f2-contenido').innerHTML = '';

    fetch(BASE_URL + '?format=statsjson')
      .then(function(r) { return r.json(); })
      .then(function(data) { statsYaCargadas = true; renderizarStats(data); })
      .catch(function() {
        document.getElementById('stats-contenido').innerHTML =
          '<div class="estado">Error al cargar estadísticas. Intenta de nuevo.</div>';
      });

    fetch(BASE_URL + '?format=statsf2')
      .then(function(r) { return r.json(); })
      .then(function(data) { renderizarStatsF2(data); })
      .catch(function() { /* Fase 2 aún no generada — silencioso */ });
  }

  function renderizarStats(data) {
    var matches = data.matches || [];
    if (matches.length === 0) {
      document.getElementById('stats-contenido').innerHTML =
        '<div class="estado">Sin estadísticas disponibles aún.<br>' +
        '<small>El administrador debe ejecutar "Estadísticas → Fase 1" desde la hoja maestra.</small></div>';
      return;
    }

    var ts = matches[matches.length - 1].timestamp || '';
    if (ts) document.getElementById('stats-updated').textContent = 'Actualizado: ' + ts;

    var SECCION_LABELS = {
      'COL-G': 'Colombia — Fase de Grupos',
      'R32-':  'Dieciseisavos de Final',
      'R16-':  'Octavos de Final',
      'QF-':   'Cuartos de Final',
      'SF-':   'Semifinales',
      '3RD-':  'Tercer Puesto',
      'FINAL': 'Final',
    };
    var lastPfx = null;
    var html = '';
    matches.forEach(function(m) {
      var pfx = Object.keys(SECCION_LABELS).find(function(p) { return m.id.startsWith(p); });
      if (pfx && pfx !== lastPfx) {
        html += '<div class="stats-seccion-hdr">' + SECCION_LABELS[pfx] + '</div>';
        lastPfx = pfx;
      }
      var tot = m.total || 1;
      var wPct = (m.W / tot * 100).toFixed(0);
      var dPct = (m.D / tot * 100).toFixed(0);
      var lPct = (m.L / tot * 100).toFixed(0);

      // Header del acordeón: con banderas y marcador real si está disponible
      var tituloHtml, metaHtml;
      if (m.flagLocal) {
        var centro = m.jugado
          ? '<span class="ac-marcador-real">' + m.golesLocal + ' – ' + m.golesVisit + '</span>'
          : '<span class="ac-vs-sep">vs</span>';
        tituloHtml = '<div class="ac-titulo-match">' +
          '<span class="ac-equipo-nm">' + esc(m.local) + '</span>' +
          '<img class="ac-flag-hdr" src="' + esc(m.flagLocal) + '" alt="">' +
          centro +
          '<img class="ac-flag-hdr" src="' + esc(m.flagVisit) + '" alt="">' +
          '<span class="ac-equipo-nm">' + esc(m.visit) + '</span>' +
          '</div>';
        var fechaStr = m.fechaUtc ? fechaBogota(m.fechaUtc) : '';
        metaHtml = (fechaStr || esc(m.label)) + ' &nbsp;·&nbsp; ' + m.total + '/' + m.totalPartic + ' predicciones';
      } else {
        tituloHtml = '<div class="ac-titulo">' + esc(m.local) + ' vs ' + esc(m.visit) + '</div>';
        metaHtml   = esc(m.label) + ' &nbsp;·&nbsp; ' + m.total + '/' + m.totalPartic + ' predicciones';
      }

      html += '<div class="ac-item" id="ac-' + esc(m.id) + '">' +
        '<div class="ac-header" onclick="toggleAc(' + "'" + escJs(m.id) + "'" + ')">' +
          '<div class="ac-info">' +
            tituloHtml +
            '<div class="ac-meta">' + metaHtml + '</div>' +
          '</div>' +
          '<div class="ac-tags">' +
            '<span class="ac-tag ac-tag-w">V ' + wPct + '%</span>' +
            '<span class="ac-tag ac-tag-d">E ' + dPct + '%</span>' +
            '<span class="ac-tag ac-tag-l">D ' + lPct + '%</span>' +
          '</div>' +
          '<span class="ac-arrow">&#8250;</span>' +
        '</div>' +
        '<div class="ac-body">' +
          '<div class="ac-body-inner">' + renderStatsBody(m) + '</div>' +
        '</div>' +
        '</div>';
    });

    document.getElementById('stats-contenido').innerHTML = html;
  }

  function renderStatsBody(m) {
    var tot  = m.total > 0 ? m.total : 1;
    var maxC = m.maxCount > 0 ? m.maxCount : 1;
    var html = '';

    // W/D/L
    var isColMatch = m.id.startsWith('COL-G');
    html += '<div class="ac-seccion">' + (isColMatch ? 'Resultado Colombia' : 'Resultado') + '</div>';
    var wdlRows = [
      { lbl: isColMatch ? 'Victoria' : 'Gana ' + esc(m.local), cnt: m.W, pctCls: 'wdl-pct-w', fillCls: 'wdl-fill-w' },
      { lbl: 'Empate',                                           cnt: m.D, pctCls: 'wdl-pct-d', fillCls: 'wdl-fill-d' },
      { lbl: isColMatch ? 'Derrota'  : 'Gana ' + esc(m.visit),  cnt: m.L, pctCls: 'wdl-pct-l', fillCls: 'wdl-fill-l' },
    ];
    wdlRows.forEach(function(r) {
      var pct = (r.cnt / tot * 100).toFixed(1);
      html += '<div class="wdl-row">' +
        '<div class="wdl-lbl">' + r.lbl + '</div>' +
        '<div class="wdl-pct ' + r.pctCls + '">' + (r.cnt / tot * 100).toFixed(0) + '%</div>' +
        '<div class="wdl-track"><div class="wdl-fill ' + r.fillCls + '" style="width:' + pct + '%"></div></div>' +
        '<div class="wdl-cnt">' + r.cnt + ' pollas</div>' +
        '</div>';
    });

    // Marcadores
    if (m.sortedScores && m.sortedScores.length > 0) {
      html += '<div class="ac-seccion">Marcadores más apostados (' + esc(m.local) + ' — ' + esc(m.visit) + ')</div>';
      m.sortedScores.forEach(function(sc, i) {
        var w = (sc[1] / maxC * 100).toFixed(1);
        var pct = (sc[1] / tot * 100).toFixed(1);
        html += '<div class="sc-row">' +
          '<div class="sc-lbl">' + esc(sc[0]) + '</div>' +
          '<div class="sc-track"><div class="sc-fill" style="width:' + w + '%"></div></div>' +
          '<div class="sc-cnt">' + sc[1] + ' &nbsp;·&nbsp; ' + pct + '%</div>' +
          '</div>';
      });
    }

    return html;
  }

  function toggleAc(id) {
    var item = document.getElementById('ac-' + id);
    if (item) item.classList.toggle('abierto');
  }

  // ── Posiciones ───────────────────────────────────────────
  function renderizar(datos) {
    document.getElementById('updated').textContent = 'Actualizado: ' + datos.actualizado;

    if (!datos.filas || datos.filas.length === 0) {
      document.getElementById('contenido').innerHTML =
        '<div class="estado">Aún no hay participantes habilitados.</div>';
      return;
    }

    var medals    = ['', '🥇', '🥈', '🥉'];
    var medalClass = ['', 'medal-1', 'medal-2', 'medal-3'];
    var rowClass   = ['', 'top1',    'top2',    'top3'];

    var html = '<table><thead><tr>' +
      '<th>#</th>' +
      '<th>Participante</th>' +
      '<th>Total</th>' +
      '<th class="hide-mobile">Grupos</th>' +
      '<th class="hide-mobile">R32</th>' +
      '<th class="hide-mobile">Octavos</th>' +
      '<th class="hide-mobile">Cuartos</th>' +
      '<th class="hide-mobile">Semis</th>' +
      '<th class="hide-mobile">Final</th>' +
      '<th class="hide-mobile">Bonus</th>' +
      '</tr></thead><tbody>';

    datos.filas.forEach(function(f) {
      var pos  = f.posicion;
      var icon = pos <= 3 ? medals[pos] : pos;
      var mc   = pos <= 3 ? medalClass[pos] : '';
      var rc   = pos <= 3 ? rowClass[pos]   : '';
      html += '<tr class="' + rc + '">' +
        '<td><span class="pos ' + mc + '">' + icon + '</span></td>' +
        '<td>' +
          '<span class="nombre-link" onclick="verDetalle(' + "'" + escJs(f.alias) + "'" + ')">' +
            esc(f.nombre) +
          '</span>' +
          '<br><span class="alias-tag">' + esc(f.alias) + '</span>' +
        '</td>' +
        '<td class="pts-total">'              + f.total     + '</td>' +
        '<td class="pts-detail hide-mobile">' + f.ptsGrupos + '</td>' +
        '<td class="pts-detail hide-mobile">' + f.ptsR32    + '</td>' +
        '<td class="pts-detail hide-mobile">' + f.ptsR16    + '</td>' +
        '<td class="pts-detail hide-mobile">' + f.ptsQF     + '</td>' +
        '<td class="pts-detail hide-mobile">' + f.ptsSF     + '</td>' +
        '<td class="pts-detail hide-mobile">' + f.ptsFinal  + '</td>' +
        '<td class="pts-detail hide-mobile">' + f.ptsBonos  + '</td>' +
        '</tr>';
    });

    html += '</tbody></table>';
    document.getElementById('contenido').innerHTML = html;
  }

  // ── Modal ─────────────────────────────────────────────────
  function verDetalle(alias) {
    document.getElementById('modalNombre').textContent = alias;
    document.getElementById('modalSub').textContent    = '';
    document.getElementById('modalBody').innerHTML     = '<div class="modal-cargando">Cargando detalle...</div>';
    document.getElementById('modalOverlay').classList.add('activo');

    fetch(BASE_URL + '?format=detail&alias=' + encodeURIComponent(alias))
      .then(function(r) { return r.json(); })
      .then(function(d) { renderizarDetalle(d); })
      .catch(function() {
        document.getElementById('modalBody').innerHTML =
          '<div class="modal-error">Error al cargar el detalle.</div>';
      });
  }

  // Devuelve HTML con ✓/✗ para cada componente del puntaje (gol local, gol visitante, resultado).
  function desgloseScoreHtml(pred, res, local, visit) {
    var g1p = Number(pred.gol1), g2p = Number(pred.gol2);
    var g1r = Number(res.gol1),  g2r = Number(res.gol2);
    var ok1 = g1p === g1r;
    var ok2 = g2p === g2r;
    var okR = Math.sign(g1p - g2p) === Math.sign(g1r - g2r);
    function badge(ok, txt) {
      return '<span class="' + (ok ? 'chk-ok' : 'chk-fail') + '">' + (ok ? '✓' : '✗') + '</span> ' + esc(txt);
    }
    return badge(ok1, 'Gol ' + local) + ' &nbsp; ' + badge(ok2, 'Gol ' + visit) + ' &nbsp; ' + badge(okR, 'Resultado');
  }

  // Devuelve HTML de la línea de llave predicha (R16+): equipos con ✓/✗ por equipo.
  function llaveHtml(predTeams, actTeams) {
    var pl = (predTeams.local || '').trim();
    var pv = (predTeams.visit || '').trim();
    if (!pl && !pv) return '';
    var actualSet = {};
    if (actTeams && actTeams.local) actualSet[actTeams.local.toLowerCase()] = true;
    if (actTeams && actTeams.visit) actualSet[actTeams.visit.toLowerCase()] = true;
    var lOk = actualSet[pl.toLowerCase()] === true;
    var vOk = actualSet[pv.toLowerCase()] === true;
    return '<div class="p-llave">🔮 ' +
      esc(pl) + ' <span class="' + (lOk ? 'chk-ok' : 'chk-fail') + '">' + (lOk ? '✓' : '✗') + '</span>' +
      ' &nbsp; ' +
      esc(pv) + ' <span class="' + (vOk ? 'chk-ok' : 'chk-fail') + '">' + (vOk ? '✓' : '✗') + '</span>' +
      '</div>';
  }

  function renderizarDetalle(d) {
    if (d.error) {
      document.getElementById('modalBody').innerHTML =
        '<div class="modal-error">' + esc(d.error) + '</div>';
      return;
    }

    document.getElementById('modalNombre').textContent = d.nombre;
    document.getElementById('modalSub').textContent    = d.alias + '  ·  Posición #' + d.posicion;

    // Resumen por ronda
    var rondasHtml = '<div class="rondas-grid">';
    RONDA_RESUMEN.forEach(function(r) {
      var pts = d[r.key] || 0;
      var cls = pts > 0 ? 'ronda-cell tiene-pts' : 'ronda-cell';
      rondasHtml += '<div class="' + cls + '">' +
        '<div class="r-pts">' + pts + '</div>' +
        '<div class="r-lbl">' + r.label + '</div>' +
        '</div>';
    });
    rondasHtml += '</div>';

    // Partidos jugados, agrupados por ronda — más recientes primero
    var partidosHtml = '';
    RONDA_ORDEN.slice().reverse().forEach(function(ronda) {
      var jugados = ronda.ids.filter(function(id) {
        return d.matchResults && d.matchResults[id] !== undefined;
      }).reverse();
      if (jugados.length === 0) return;

      partidosHtml += '<div class="seccion-titulo">' + ronda.label + '</div>' +
        '<div class="partidos-lista">';

      jugados.forEach(function(id) {
        var pts       = (d.matchPts && d.matchPts[id]) || 0;
        var lbl       = (d.matchLabels && d.matchLabels[id]) || id;
        var res       = d.matchResults[id];
        var pred      = d.matchPreds && d.matchPreds[id];
        var actTeams  = d.matchTeams && d.matchTeams[id];
        var predTeams = d.matchPredTeams && d.matchPredTeams[id];
        var hasPred   = pred && pred.gol1 !== '' && pred.gol1 !== null && pred.gol1 !== undefined
                             && pred.gol2 !== '' && pred.gol2 !== null && pred.gol2 !== undefined;
        var cls       = pts > 0 ? 'partido-fila con-pts' : 'partido-fila sin-pts';

        var localName = actTeams ? actTeams.local : (lbl.split(' vs ')[0] || '');
        var visitName = actTeams ? actTeams.visit : (lbl.split(' vs ')[1] || '');
        var flagL     = actTeams && actTeams.flagLocal  ? '<img class="p-flag" src="' + actTeams.flagLocal  + '" />' : '';
        var flagV     = actTeams && actTeams.flagVisit  ? '<img class="p-flag" src="' + actTeams.flagVisit  + '" />' : '';

        // Línea 1: resultado real resaltado con banderas
        var lineaResultado =
          '<div class="p-resultado">' +
            '<span>' + esc(localName) + '</span>' + flagL +
            '<span class="p-score">' + res.gol1 + ' – ' + res.gol2 + '</span>' +
            flagV + '<span>' + esc(visitName) + '</span>' +
          '</div>';

        // Línea 2 (R16+): llave predicha con ✓/✗
        var lineaLlave = predTeams ? llaveHtml(predTeams, actTeams) : '';

        // Línea 3: predicción del participante
        var lineaPred = hasPred
          ? '<div class="p-pred-line">🎯 Pronóstico: ' + pred.gol1 + ' – ' + pred.gol2 + '</div>'
          : '<div class="p-pred-line">sin predicción</div>';

        // Línea 4: desglose de puntos
        var lineaDesglose = '';
        if (hasPred && res) {
          if (predTeams) {
            var actualSet = {};
            if (actTeams && actTeams.local) actualSet[actTeams.local.toLowerCase()] = true;
            if (actTeams && actTeams.visit) actualSet[actTeams.visit.toLowerCase()] = true;
            var pl = (predTeams.local || '').trim().toLowerCase();
            var pv = (predTeams.visit || '').trim().toLowerCase();
            var ambosOk = pl && pv && actualSet[pl] && actualSet[pv];
            lineaDesglose = '<div class="p-desglose">' +
              (ambosOk
                ? desgloseScoreHtml(pred, res, localName, visitName)
                : '<span class="chk-fail">✗</span> equipos incorrectos en llave') +
              '</div>';
          } else {
            lineaDesglose = '<div class="p-desglose">' + desgloseScoreHtml(pred, res, localName, visitName) + '</div>';
          }
        }

        partidosHtml += '<div class="' + cls + '">' +
          '<div class="p-info">' +
            lineaResultado +
            lineaLlave +
            lineaPred +
            lineaDesglose +
          '</div>' +
          '<span class="p-pts">' + pts + ' pts</span>' +
          '</div>';
      });

      partidosHtml += '</div>';
    });

    // Bonus de posición (si aplica)
    var bonusHtml = '';
    if (d.ptsBonos > 0) {
      bonusHtml = '<div class="seccion-titulo">Bonus posición final</div>' +
        '<div class="partidos-lista"><div class="partido-fila con-pts">' +
        '<div class="p-info"><div class="p-equipos">Campeón / Subcampeón / 3er puesto</div></div>' +
        '<span class="p-pts">' + d.ptsBonos + ' pts</span>' +
        '</div></div>';
    }

    if (!partidosHtml && !bonusHtml) {
      partidosHtml = '<div class="partidos-lista"><div class="partido-fila sin-pts">' +
        '<div class="p-info"><div class="p-equipos">Sin partidos jugados aún</div></div>' +
        '<span class="p-pts">—</span></div></div>';
    }

    document.getElementById('modalBody').innerHTML =
      '<div class="total-badge">' +
        '<div class="pts">' + d.total + '</div>' +
        '<div class="lbl">puntos totales</div>' +
      '</div>' +
      rondasHtml + partidosHtml + bonusHtml;
  }

  function cerrarModal(e) {
    if (e && e.target !== document.getElementById('modalOverlay')) return;
    document.getElementById('modalOverlay').classList.remove('activo');
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function escJs(s) {
    return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  }

  // ── Stats Fase 2 ─────────────────────────────────────────────────────────────

  function renderizarStatsF2(data) {
    var el = document.getElementById('stats-f2-contenido');
    if (!data || data.error) {
      el.innerHTML = '';  // sin datos aún — silencioso (se muestra cuando el admin genere caché)
      return;
    }

    var html = '<div class="f2-divider">⚽ Fase 2 — Eliminatorias</div>';

    // 1 — Pronósticos de posición final
    html += '<div class="f2-sub">Pronósticos de posición final · ' + data.totalPlanillas + ' planillas</div>';
    html += '<div class="bono-grid">';
    html += _renderBonoCard('🏆 Campeón',    data.campeon    || [], 'gold');
    html += _renderBonoCard('🥈 Subcampeón', data.subcampeon || [], 'silver');
    html += _renderBonoCard('🥉 3er puesto', data.tercero    || [], 'bronze');
    html += '</div>';

    // 2 — Aciertos de llave (solo si hay partidos jugados)
    var llave = data.aciertosLlave || [];
    if (llave.length > 0) {
      html += '<div class="f2-sub">Aciertos de llave — partidos jugados</div>';
      llave.forEach(function(m) { html += _renderLlaveMatch(m); });
    }

    // 3 — Equipos más predichos por ronda
    var rondas = data.equiposPorRonda || {};
    var RONDAS_DEF = [
      { key: 'R16',   label: 'Octavos de final' },
      { key: 'QF',    label: 'Cuartos de final' },
      { key: 'SF',    label: 'Semifinales' },
      { key: 'Final', label: 'Final y 3er puesto' },
    ];
    var tieneEquipos = RONDAS_DEF.some(function(r) { return (rondas[r.key] || []).length > 0; });
    if (tieneEquipos) {
      html += '<div class="f2-sub">Equipos más predichos por ronda</div>';
      RONDAS_DEF.forEach(function(r) {
        var equipos = rondas[r.key] || [];
        if (equipos.length === 0) return;
        var maxC = equipos[0].count || 1;
        html += '<div class="ronda-section"><div class="ronda-section-titulo">' + esc(r.label) + '</div>';
        equipos.slice(0, 12).forEach(function(eq, i) {
          var pct = (eq.count / maxC * 100).toFixed(0);
          html += '<div class="equipo-row">' +
            '<span class="equipo-pos">' + (i + 1) + '</span>' +
            '<span class="equipo-nombre">' + esc(eq.equipo) + '</span>' +
            '<div class="equipo-track"><div class="equipo-fill" style="width:' + pct + '%"></div></div>' +
            '<span class="equipo-cnt">' + eq.count + '</span>' +
            '</div>';
        });
        html += '</div>';
      });
    }

    if (data.generado) {
      html += '<div style="font-size:0.68rem;color:#aab4c0;margin-top:12px;text-align:right">Caché: ' + esc(data.generado) + '</div>';
    }

    el.innerHTML = html;
  }

  function _renderBonoCard(titulo, equipos, cls) {
    var max  = equipos.length > 0 ? (equipos[0].count || 1) : 1;
    var html = '<div class="bono-card"><div class="bono-card-head ' + cls + '">' + titulo + '</div>';
    if (equipos.length === 0) {
      html += '<div style="font-size:0.75rem;color:#aab4c0;padding:4px 0">Sin datos</div>';
    } else {
      equipos.slice(0, 10).forEach(function(eq) {
        var pct = (eq.count / max * 100).toFixed(0);
        html += '<div class="bono-row">' +
          '<span class="bono-equipo" title="' + esc(eq.equipo) + '">' + esc(eq.equipo) + '</span>' +
          '<div class="bono-track"><div class="bono-fill ' + cls + '" style="width:' + pct + '%"></div></div>' +
          '<span class="bono-cnt">' + eq.count + '</span>' +
          '</div>';
      });
    }
    return html + '</div>';
  }

  function _renderLlaveMatch(m) {
    var tot = m.total || 1;
    function seg(cls, n) {
      if (!n) return '';
      var pct = (n / tot * 100).toFixed(1);
      return '<div class="llave-seg ' + cls + '" style="flex:' + n + '">' +
        (parseFloat(pct) >= 10 ? n : '') + '</div>';
    }
    var html = '<div class="llave-match">' +
      '<div class="llave-match-titulo">' + esc(m.label) + '</div>' +
      '<div class="llave-bar-cont">' +
        seg('ambos',   m.ambos)   +
        seg('uno',     m.uno)     +
        seg('ninguno', m.ninguno) +
        seg('sinData', m.sinData) +
      '</div>' +
      '<div class="llave-leyenda">';
    if (m.ambos)   html += '<span><span class="llave-dot" style="background:#2e7d32"></span>Ambos ✓: ' + m.ambos + '</span>';
    if (m.uno)     html += '<span><span class="llave-dot" style="background:#f9a825"></span>Uno ✓: ' + m.uno + '</span>';
    if (m.ninguno) html += '<span><span class="llave-dot" style="background:#c62828"></span>Ninguno: ' + m.ninguno + '</span>';
    if (m.sinData) html += '<span><span class="llave-dot" style="background:#d5dce4"></span>S/d: ' + m.sinData + '</span>';
    return html + '</div></div>';
  }
</script>

</body>
</html>
